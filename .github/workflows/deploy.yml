name: Deploy to DirectAdmin

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build static export
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Verify build output
        run: |
          test -d out
          test -f out/index.html
          echo "✓ Build output verified — $(find out -type f | wc -l) files"

      - name: Deploy over SSH
        # The local build (above) is only a sanity check + cache warm-up.
        # The real deploy reruns the build on the server inside deploy.sh so
        # the live output came from the exact code at HEAD on the server.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          timeout: 10m
          command_timeout: 10m
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            export HEALTH_URL="${{ vars.APP_URL }}"
            cd "$DEPLOY_PATH"
            bash deploy.sh
